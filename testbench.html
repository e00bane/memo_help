<!DOCTYPE html>
<html>

<head>
    <title>
        How to use Checkbox inside Select Option using JavaScript?
    </title>

    <style>
        h1 {
            color: green;
        }
    </style>

    <script type="module">
        import {populateContextFieldset} from './contextCheckboxCtrl.js';
        // Initialize the checkboxes when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            populateContextFieldset(3); // Example: populate with context options for the first contact
        });
    </script>
</head>

<body>
    <h1>GEEKSFORGEEKS</h1>

    <h2>Use CheckBox inside Select Option</h2>

    <p>Click the dropdown to see the checkboxes:</p>

    <fieldset id="ContextFieldset" class="fieldset">
        <legend>Context:</legend>
    </fieldset>
</body>

</html>
