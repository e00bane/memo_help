<!DOCTYPE html>
<html>
    <head>
        <title>Omar's Workplace Memo Helper</title>
        <link rel="stylesheet" href="MemoHelperStyle.css">

        <script type="module">
            import { initializeDropdowns } from './memoDropdownCtrl.js';
            import { updateMemoText } from './memoTextCtrl.js';
            import { handleCopyButtonClick } from './copyBtnCtrl.js';
            import { startCraps } from './Craps.js';

            window.addEventListener('DOMContentLoaded', () => {
                initializeDropdowns();

                document.addEventListener('change', (e) => {
                    if (e.target && ['ContactDropdown', 'EventDropdown', 'ContextDropdown', 'CallDropdown'].includes(e.target.id)) {
                        updateMemoText();
                    }
                });

                document.querySelectorAll('button[data-copy-button]').forEach((button) => {
                    button.addEventListener('click', () => handleCopyButtonClick(button.id));
                });

                const crapsButton = document.getElementById('crapsPlayButton');
                if (crapsButton) {
                    crapsButton.addEventListener('click', startCraps);
                }
            });
        </script>
    </head>

    <body>
        <table id="HeaderTbl">
            <td>
                <img src="https://www.clipartmax.com/png/small/4-40964_man-computer-clipart-work-working-office-workplace-work-desk-icon.png" alt="Man Computer Clipart Work Working Office Workplace - Work Desk Icon @clipartmax.com">
            </td>
            <td>
                <h1>Workplace Memo Helper</h1>
            </td>
        </table>

            
        <table id="memoBuilderTbl">
            <tr>
                <h3><span id="MemoText">Memo Text</span></h3>
            </tr>
            <tr>
                <td><select id="ContactDropdown" class="MemoDropdown"></select></td>
                <td><select id="EventDropdown" class="MemoDropdown"></select></td>
                <td><select id="ContextDropdown" class="MemoDropdown"></select></td>
            </tr>
        </table>


        <table id="memoButtonsTbl">
            <tr>
                <td><button class="button" id="h1CopyButton" data-copy-button value="H1">Home1</button></td>
                <td><button class="button" id="o1CopyButton" data-copy-button value="O1">O1</button></td>
                <td><button class="button" id="w1CopyButton" data-copy-button value="W1">W1</button></td>
            </tr>
            <tr>
                <td><button class="button" id="h2CopyButton" data-copy-button value="H2">H2</button></td>
                <td><button class="button" id="o2CopyButton" data-copy-button value="O2">O2</button></td>
                <td><button class="button" id="w2CopyButton" data-copy-button value="W2">W2</button></td>
            </tr>
        </table>

        <br>
        <span id="crapsGame">
            <h2 id = "blink">Let's Play Craps</h2>
            <br>
            <div id="crapsRes">Craps results</div>
            <div id="die1Res">die1 results</div>
            <div id="die2Res">die2 results</div>
            <div id="sumRes">sum results</div>
            <button id="crapsPlayButton" class="button">Play Craps</button>

            <script type="text/javascript">
                var blink = document.getElementById('blink');
                setInterval(function() {
                    blink.style.opacity = (blink.style.opacity == 0 ? 1 : 0);
                }, 1500);
            </script>
        </span>
    </body>

</html>
