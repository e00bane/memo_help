<!DOCTYPE html>
<html>
<head>
    <title>Omar's Workplace Memo Helper</title>
    <link rel="stylesheet" href="MemoHelperStyle.css">

    <script type="module">
        import { initializeDropdowns, showCheckboxes, hideCheckboxes, toggleCheckboxes, checkboxesIsHidden } from './memoDropdownCtrl.js';
        import { updateMemoText } from './memoTextCtrl.js';
        import { handleCopyButtonClick } from './copyBtnCtrl.js';

        
        const contextDropdownBox = document.getElementById('contextDropdownBox');
        const contextSelectBox = contextDropdownBox ? contextDropdownBox.querySelector('.selectBox') : null;

        // setting listeners

        window.addEventListener('DOMContentLoaded', () => {
            initializeDropdowns();

            document.addEventListener('change', (e) => {
                if (e.target && ['ContactDropdown', 'EventDropdown', 'ContextDropdown', 'CallDropdown'].includes(e.target.id)) {
                    updateMemoText();
                }
            });

            document.querySelectorAll('button[data-copy-button]').forEach((button) => {
                // Pass the event so the handler can use event.currentTarget and avoid clicks on child nodes
                button.addEventListener('click', (e) => handleCopyButtonClick(e));
            });


            if (contextSelectBox) {
                contextSelectBox.addEventListener('click', toggleCheckboxes);
            }

            document.addEventListener('click', (e) => {
                if (contextDropdownBox && 
                !contextDropdownBox.contains(e.target) && 
                checkboxesIsHidden() === false) {
                    hideCheckboxes();
                }
            });

        });
    </script>
</head>

<body>
    <table id="HeaderTbl">
        <td>
            <img src="https://www.clipartmax.com/png/small/4-40964_man-computer-clipart-work-working-office-workplace-work-desk-icon.png" alt="Man Computer Clipart Work Working Office Workplace - Work Desk Icon @clipartmax.com">
        </td>
        <td>
            <h1>Workplace Memo Helper</h1>
        </td>
    </table>

        
    <!-- Dropdowns for Contact, Event, Context, and Call -->
    <table id="memoBuilderTbl">
        <tr>
            <h3><span id="MemoText">Memo Text</span></h3>
        </tr>
        <tr>
            <td><select id="ContactDropdown" class="MemoDropdown"></select></td>
            <td><select id="EventDropdown" class="MemoDropdown"></select></td>
            <td><select id="ContextDropdown" class="MemoDropdown"></select></td>
            <td><div class="MemoDropdown" id="contextDropdownBox">
                <div class="selectBox" id="contextSelectBox">
                    <select>
                        <option>-- Select --</option>
                    </select>
                    <div class="overSelect"></div>
                </div>
                <div id="contextCheckboxes"></div>
            </div></td>
        </tr>
    </table>


    <!-- Buttons for copying memo text with different prefixes -->
    <table id="memoButtonsTbl">
        <tr>
            <td><button name="Home1" class="button" id="h1CopyButton" data-copy-button value="H1">Home 1</button></td>
            <td><button name="Other1" class="button" id="o1CopyButton" data-copy-button value="O1">Other 1</button></td>
            <td><button name="Work1" class="button" id="w1CopyButton" data-copy-button value="W1">Work 1</button></td>
        </tr>
        <tr>
            <td><button name="Home2" class="button" id="h2CopyButton" data-copy-button value="H2">Home 2</button></td>
            <td><button name="Other2" class="button" id="o2CopyButton" data-copy-button value="O2">Other 2</button></td>
            <td><button name="Work2" class="button" id="w2CopyButton" data-copy-button value="W2">Work 2</button></td>
        </tr>
    </table>

    <br>
</body>
</html>
